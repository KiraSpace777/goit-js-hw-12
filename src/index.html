<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>goit-js-hw-11</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header></header>
    <main>
      <form class="form">
        <label class="form-label">
          <p class="label-text">Choose the photo</p>
          <input
            class="input-field"
            type="text"
            name="query"
            autocomplete="off"
            placeholder="Search images..."
          />
        </label>
        <button class="submit-btn" type="submit">Search</button>
      </form>

      <!-- Елемент для модалки simplelightbox (галарея, велике зображення) -->
      <ul class="gallery"></ul>

      <!-- Кнопка дозавантаження (спочатку прихована класом is-hidden) -->
      <button type="button" class="load-more submit-btn is-hidden">
        Load more
      </button>

      <!-- Додаємо цей абзац -->
      <p class="images-counter is-hidden"></p>

      <!-- Елемент для css-loader (стилі в CSS, без зовнішньої бібліотеки) -->
      <div class="loader-overlay">
        <span class="loader"></span>
      </div>

      <button
        type="button"
        class="back-to-top is-hidden"
        id="backToTop"
        title="Go to top"
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="m18 15-6-6-6 6" />
        </svg>
      </button>
    </main>

    <footer class="footer">
      <div class="container">
        <p class="footer-desc">
          Made with ✨ by <b>Anna K.</b> (images provided by
          <a href="https://pixabay.com">"Pixabay"</a>)
        </p>
      </div>
    </footer>

    <script type="module" src="./main.js"></script>
  </body>
</html>
